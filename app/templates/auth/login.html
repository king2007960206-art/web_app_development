{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5 text-center">
                <h3 class="fw-bold mb-4">歡迎回來</h3>
                <p class="text-muted mb-4">請輸入您的帳號密碼解鎖記帳簿。<br><small>(若帳號不存在將自動註冊)</small></p>
                
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="請輸入帳號" required>
                        <label for="username">帳號</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="請輸入密碼" required>
                        <label for="password">密碼</label>
                    </div>
                    <button class="btn btn-primary w-100 py-2 fs-5" type="submit">解鎖 / 登入</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
