{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center mt-5 fade-in-up">
    <div class="col-md-6 col-lg-5">
        <div class="glass-panel p-5">
            <div class="text-center mb-4">
                <h1 class="h2 fw-bold text-gradient mb-2">開始學習體驗</h1>
                <p>建立新帳戶，完全免費</p>
            </div>
            
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="mb-4">
                    <label for="username" class="form-label">使用者名稱</label>
                    <input type="text" class="form-control glass-input" id="username" name="username" placeholder="你的名字或暱稱" required>
                </div>
                
                <div class="mb-4">
                    <label for="email" class="form-label">電子信箱</label>
                    <input type="email" class="form-control glass-input" id="email" name="email" placeholder="name@example.com" required>
                </div>
                
                <div class="mb-5">
                    <label for="password" class="form-label">設定密碼</label>
                    <input type="password" class="form-control glass-input" id="password" name="password" placeholder="請設定一組安全密碼" required>
                </div>
                
                <button type="submit" class="btn btn-primary glass-btn-primary w-100 py-3 fs-5 mb-4">建立帳號</button>
                
                <div class="text-center">
                    <p class="mb-0">已經有帳號了嗎？ <a href="{{ url_for('auth.login') }}" class="text-info text-decoration-none fw-bold">前往登入</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
