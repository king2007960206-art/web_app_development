{% extends "base.html" %}
{% block content %}
<div class="row fade-in-up">
    <div class="col-12 mb-4 d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-1">
                    <li class="breadcrumb-item"><a href="{{ url_for('subjects.index') }}" class="text-info text-decoration-none">{{ note.subject.name }}</a></li>
                    <li class="breadcrumb-item"><a href="{{ url_for('notes.list_notes', subject_id=note.subject.id) }}" class="text-info text-decoration-none">筆記庫</a></li>
                    <li class="breadcrumb-item active text-white" aria-current="page">{{ note.title }}</li>
                </ol>
            </nav>
            <h2 class="text-gradient mb-0">{{ note.title }}</h2>
        </div>
        <div class="d-flex gap-2">
            <form action="{{ url_for('quizzes.subject_quizzes', subject_id=note.subject_id) }}" method="POST">
                <input type="hidden" name="note_id" value="{{ note.id }}">
                <button type="submit" class="btn btn-warning glass-btn text-dark fw-bold px-4 shadow">
                    <i class="bi bi-lightning-charge-fill"></i> 從這份筆記抽測驗
                </button>
            </form>
        </div>
    </div>
    
    <div class="col-lg-8 mb-4">
        <div class="glass-panel h-100">
            <h4 class="text-info border-bottom border-secondary pb-3 mb-4"><i class="bi bi-stars"></i> AI 結構化精要</h4>
            <!-- AI 回傳常包含多行排版 -->
            <div class="text-white fs-5" style="white-space: pre-wrap; line-height: 1.8;">{{ note.ai_summary }}</div>
        </div>
    </div>
    
    <div class="col-lg-4 mb-4">
        <div class="glass-panel h-100" style="background: rgba(255,255,255,0.02);">
            <h5 class="text-secondary pb-3 mb-3 border-bottom border-dark"><i class="bi bi-code-slash"></i> 原始內容對照</h5>
            <div class="text-muted small" style="white-space: pre-wrap; line-height: 1.6; font-family: monospace; max-height: 60vh; overflow-y: auto;">{{ note.original_content }}</div>
        </div>
    </div>
</div>
{% endblock %}
