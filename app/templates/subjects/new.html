{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center fade-in-up">
    <div class="col-md-8 col-lg-6 mt-4">
        <div class="glass-panel">
            <div class="mb-4 text-center">
                <h2 class="text-white h3 mb-2">建立學習科目</h2>
                <p class="text-secondary">建立新的大分類來集中管理相關的教材與測驗。</p>
            </div>
            
            <form action="{{ url_for('subjects.index') }}" method="POST">
                <div class="mb-4">
                    <label for="name" class="form-label">科目名稱 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control glass-input" id="name" name="name" placeholder="例如：高中物理、多益英文" required>
                </div>
                
                <div class="mb-4">
                    <label for="description" class="form-label">科目描述 (選填)</label>
                    <textarea class="form-control glass-input" id="description" name="description" rows="4" placeholder="簡單註記一下學習目標..."></textarea>
                </div>
                
                <div class="d-flex justify-content-end gap-3 mt-5">
                    <a href="{{ url_for('subjects.index') }}" class="btn btn-outline-secondary glass-btn px-4 py-2">取消返回</a>
                    <button type="submit" class="btn btn-primary glass-btn-primary px-5 py-2">確認建立</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
