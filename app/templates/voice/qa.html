{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center h-100 fade-in-up">
    <div class="col-lg-8 d-flex flex-column" style="min-height: 70vh;">
        <div class="text-center mb-4">
            <h2 class="text-gradient"><i class="bi bi-headset"></i> AI 語音學習夥伴</h2>
            <p class="text-secondary">用說的也可以！語音識別系統將自動轉換對談並回傳解答。</p>
        </div>
        
        <div class="glass-panel flex-grow-1 d-flex flex-column p-0 overflow-hidden mb-4 border-info opacity-75 focus-ring">
            <div class="p-4 flex-grow-1 d-flex flex-column" id="chatWindow" style="overflow-y: auto; max-height: 50vh;">
                <!-- Chat Messages appended here via JS -->
                <div class="d-flex w-100 mb-4 justify-content-start">
                    <div class="p-3 rounded-4 bg-primary text-white shadow-sm" style="max-width: 80%; border-bottom-left-radius: 0;">
                        你好，我是你的 AI 學習夥伴！遇到什麼不懂的概念嗎？點擊下方按鈕開始說話或直接打字問我！
                    </div>
                </div>
            </div>
            
            <div class="p-3 border-top border-secondary" style="background: rgba(0,0,0,0.2);">
                <div class="input-group">
                    <button class="btn btn-outline-warning glass-btn border-end-0" type="button" id="micBtn" title="語音輸入">
                        <i class="bi bi-mic fs-5" id="micIcon"></i>
                    </button>
                    <input type="text" id="chatInput" class="form-control glass-input border-start-0" placeholder="輸入問題或開始講話...">
                    <button class="btn btn-primary glass-btn-primary px-4" type="button" id="sendBtn">
                        <i class="bi bi-send"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const chatWindow = document.getElementById('chatWindow');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const micIcon = document.getElementById('micIcon');
    
    // Web Speech API
    let recognition;
    let isRecording = false;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = false;
        recognition.interimResults = false;
        
        recognition.onstart = () => {
            isRecording = true;
            micIcon.classList.replace('bi-mic', 'bi-mic-fill');
            micBtn.classList.replace('btn-outline-warning', 'btn-warning');
            chatInput.placeholder = "聆聽中...";
        };
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            chatInput.value = transcript;
            sendMessage(transcript); // auto send after speech
        };
        
        recognition.onerror = (e) => {
            console.error(e);
            stopRecording();
        };
        
        recognition.onend = stopRecording;
    } else {
        micBtn.style.display = 'none';
        chatInput.placeholder = "您的瀏覽器不支援語音輸入，請直接打字。";
    }
    
    function stopRecording() {
        isRecording = false;
        micIcon.classList.replace('bi-mic-fill', 'bi-mic');
        micBtn.classList.replace('btn-warning', 'btn-outline-warning');
        chatInput.placeholder = "輸入問題或點擊麥克風...";
    }
    
    micBtn.addEventListener('click', () => {
        if (!recognition) return;
        if (isRecording) { recognition.stop(); } 
        else { recognition.start(); }
    });

    sendBtn.addEventListener('click', () => {
        if (chatInput.value.trim()) sendMessage(chatInput.value.trim());
    });
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && chatInput.value.trim()) sendMessage(chatInput.value.trim());
    });

    async function sendMessage(text) {
        chatInput.value = '';
        
        // Append user bubble
        appendBubble(text, 'end', 'bg-secondary');
        
        // Append loading
        const loadingId = 'loading-' + Date.now();
        appendBubble('<div class="spinner-grow spinner-grow-sm" role="status"></div>', 'start', 'bg-info', loadingId);
        
        try {
            const res = await fetch('{{ url_for("voice.api_voice_ask") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });
            const data = await res.json();
            
            // remove loading
            document.getElementById(loadingId).remove();
            
            if (data.status === 'success') {
                appendBubble(data.answer, 'start', 'bg-primary');
                speakText(data.answer);
            } else {
                appendBubble(data.message || '發生錯誤。', 'start', 'bg-danger');
            }
        } catch (err) {
            document.getElementById(loadingId).remove();
            appendBubble('無法連接到伺服器。', 'start', 'bg-danger');
        }
    }
    
    function appendBubble(content, align, bgClass, id=null) {
        const wrapper = document.createElement('div');
        wrapper.className = `d-flex w-100 mb-4 justify-content-${align}`;
        if(id) wrapper.id = id;
        
        const radiusStyles = align === 'end' ? 'border-bottom-right-radius: 0;' : 'border-bottom-left-radius: 0;';
        wrapper.innerHTML = `
            <div class="p-3 rounded-4 ${bgClass} text-white shadow" style="max-width: 80%; ${radiusStyles}">
                ${content.replace(/\n/g, '<br>')}
            </div>
        `;
        chatWindow.appendChild(wrapper);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
    
    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
        }
    }
</script>
{% endblock %}
